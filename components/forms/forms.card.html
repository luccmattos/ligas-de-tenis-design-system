<!-- @dsCard group="Components" viewport="700x420" name="Forms" subtitle="Inputs, select, and selectable option cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 28px; color: var(--text-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 620px; }
  .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 0 0 12px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 22px; max-width: 620px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../ds-bundle.js"></script>
<script type="text/babel">
  const { Input, Select, OptionCard } = window.LigasDeTNisDesignSystem_6dc710;
  function Demo() {
    const [pick, setPick] = React.useState('ranking');
    return (
      <div>
        <div className="grid">
          <Input label="Nome completo" defaultValue="Fernando Albuquerque" />
          <Input label="E-mail" type="email" placeholder="seu@email.com" />
          <Input label="Telefone" error="Número inválido" defaultValue="11 9999" />
          <Select label="Categoria" options={['A · Open', 'B · Open', 'C · Open']} defaultValue="B · Open" />
        </div>
        <div className="cards">
          <OptionCard label="Ranking" description="Jogue o semestre" selected={pick==='ranking'} onSelect={() => setPick('ranking')} />
          <OptionCard label="Torneio" description="Etapas ATP" selected={pick==='torneio'} onSelect={() => setPick('torneio')} />
          <OptionCard label="Os dois" description="Ranking + torneio" selected={pick==='ambos'} onSelect={() => setPick('ambos')} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
