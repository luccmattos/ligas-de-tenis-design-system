<!-- @dsCard group="Type" viewport="700x170" name="Labels & weights" subtitle="Uppercase overlines and the Outfit weight ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 28px; color: var(--text-body); display:flex; gap: 40px; }
  .col { display: flex; flex-direction: column; gap: 14px; }
  .h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 0; }
  .overline { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-label); }
  .weights { display: flex; flex-direction: column; gap: 6px; }
  .w { font-size: 18px; color: var(--text-heading); }
</style>
</head>
<body>
  <div class="col">
    <p class="h">Overlines / labels</p>
    <span class="overline" style="color: var(--color-blue);">Liga Alphaville de Tênis</span>
    <span class="overline" style="color: var(--text-muted);">Categoria B · Open</span>
    <span class="overline" style="color: var(--color-green-dark);">Inscrição confirmada</span>
  </div>
  <div class="col">
    <p class="h">Outfit weights</p>
    <div class="weights">
      <span class="w" style="font-weight: 400;">400 Regular</span>
      <span class="w" style="font-weight: 500;">500 Medium</span>
      <span class="w" style="font-weight: 600;">600 Semibold</span>
      <span class="w" style="font-weight: 700;">700 Bold</span>
      <span class="w" style="font-weight: 800;">800 Extrabold</span>
    </div>
  </div>
</body>
</html>
