<!-- @dsCard group="Type" viewport="700x250" name="Display — Bebas Neue" subtitle="Condensed all-caps headlines that command the page" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 28px; color: var(--text-body); }
  .spec { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .disp { font-family: var(--font-display); color: var(--text-heading); line-height: 1; letter-spacing: var(--tracking-display); }
  .meta { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; white-space: nowrap; }
</style>
</head>
<body>
  <div class="spec">
    <div class="line"><span class="disp" style="font-size: 72px;">MATCH DAY</span><span class="meta">H1 · clamp(52–88px)</span></div>
    <div class="line"><span class="disp" style="font-size: 48px;">RANKING DE DESAFIOS</span><span class="meta">H2 · clamp(36–56px)</span></div>
    <div class="line"><span class="disp" style="font-size: 34px;">PRÓXIMA RODADA</span><span class="meta">Display sm · 28–40px</span></div>
  </div>
</body>
</html>
