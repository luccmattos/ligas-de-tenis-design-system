<!-- @dsCard group="Brand" viewport="700x230" name="League family" subtitle="LT umbrella, plus LISP, LAS (squash) and Ravenna beach tennis" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .panel { border-radius: var(--radius-lg); background: var(--color-off-white); border: 1px solid var(--border-subtle); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 170px; padding: 12px; }
  .panel img { max-height: 110px; max-width: 100%; width: auto; }
  .cap { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="panel"><img src="../../assets/logos/logo-official-lt-default-ligas-de-tenis@2x.png" alt="LT umbrella"><span class="cap">LT · umbrella</span></div>
    <div class="panel"><img src="../../assets/logos/logo-official-lisp-default-ligas-de-tenis.png" alt="LISP"><span class="cap">LISP</span></div>
    <div class="panel"><img src="../../assets/logos/logo-official-las-default-ligas-de-tenis.png" alt="LAS squash"><span class="cap">LAS · squash</span></div>
    <div class="panel"><img src="../../assets/logos/logo-official-larb-option-a-ligas-de-tenis.png" alt="Ravenna beach tennis"><span class="cap">LARB · beach</span></div>
  </div>
</body>
</html>
