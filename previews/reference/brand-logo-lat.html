<!-- @dsCard group="Brand" viewport="700x360" name="Primary logos — LAT" subtitle="Default on light · Light on navy · Blue-finals for events" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-body); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .panel { border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 180px; border: 1px solid var(--border-subtle); }
  .panel img { height: 130px; width: auto; }
  .cap { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .light { background: var(--color-off-white); }
  .dark { background: var(--color-navy); }
  .branded { background: linear-gradient(135deg, var(--color-blue), var(--color-navy)); }
</style>
</head>
<body>
  <div class="row">
    <div class="panel light">
      <img src="../../assets/logos/logo-official-lat-default-ligas-de-tenis.svg" alt="LAT default on light">
      <span class="cap">default · light BG</span>
    </div>
    <div class="panel dark">
      <img src="../../assets/logos/logo-official-lat-light-ligas-de-tenis.svg" alt="LAT light on navy">
      <span class="cap" style="color: rgba(255,255,255,0.7);">light · navy BG</span>
    </div>
    <div class="panel branded">
      <img src="../../assets/logos/logo-official-lat-blue-finals-ligas-de-tenis.svg" alt="LAT blue-finals">
      <span class="cap" style="color: rgba(255,255,255,0.7);">blue-finals · events</span>
    </div>
  </div>
</body>
</html>
