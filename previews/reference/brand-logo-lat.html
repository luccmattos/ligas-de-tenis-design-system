<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-body); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .panel { border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; height: 180px; border: 1px solid var(--border-subtle); }
  .panel img { height: 150px; width: auto; }
  .light { background: var(--color-off-white); }
  .dark { background: var(--color-navy); }
</style>
</head>
<body>
  <div class="row">
    <div class="panel light"><img src="../../assets/logos/logo-official-lat-default-ligas-de-tenis.png" alt="LAT logo on light"></div>
    <div class="panel dark"><img src="../../assets/logos/logo-official-lat-blue-ligas-de-tenis.png" alt="LAT logo on navy"></div>
  </div>
</body>
</html>
