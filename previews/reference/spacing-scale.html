<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base unit — tight gaps to page sections" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-body); }
  .row { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--color-blue); border-radius: 3px; }
  .v { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .t { font-size: 10px; font-weight: 700; color: var(--text-heading); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:4px;"></div><span class="t">1</span><span class="v">4</span></div>
    <div class="item"><div class="box" style="width:8px;height:8px;"></div><span class="t">2</span><span class="v">8</span></div>
    <div class="item"><div class="box" style="width:12px;height:12px;"></div><span class="t">3</span><span class="v">12</span></div>
    <div class="item"><div class="box" style="width:16px;height:16px;"></div><span class="t">4</span><span class="v">16</span></div>
    <div class="item"><div class="box" style="width:20px;height:20px;"></div><span class="t">5</span><span class="v">20</span></div>
    <div class="item"><div class="box" style="width:24px;height:24px;"></div><span class="t">6</span><span class="v">24</span></div>
    <div class="item"><div class="box" style="width:32px;height:32px;"></div><span class="t">8</span><span class="v">32</span></div>
    <div class="item"><div class="box" style="width:40px;height:40px;"></div><span class="t">10</span><span class="v">40</span></div>
    <div class="item"><div class="box" style="width:48px;height:48px;"></div><span class="t">12</span><span class="v">48</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;"></div><span class="t">16</span><span class="v">64</span></div>
    <div class="item"><div class="box" style="width:80px;height:80px;"></div><span class="t">20</span><span class="v">80</span></div>
  </div>
</body>
</html>
