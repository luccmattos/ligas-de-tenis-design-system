<!-- @dsCard group="Spacing" viewport="700x220" name="Elevation & shadows" subtitle="Navy-tinted ambient shadows plus colored CTA glows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 32px 24px; color: var(--text-body); }
  .row { display: flex; gap: 26px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 90px; height: 64px; background: var(--color-white); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .t { font-size: 11px; font-weight: 700; color: var(--text-heading); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm);"></div><span class="t">sm</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md);"></div><span class="t">md</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg);"></div><span class="t">lg</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xl);"></div><span class="t">xl</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-blue);"></div><span class="t">blue glow</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-green);"></div><span class="t">green glow</span></div>
  </div>
</body>
</html>
