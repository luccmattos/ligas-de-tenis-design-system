<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radius" subtitle="8 / 12 / 16 / 20 / pill — soft, never sharp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-body); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 70px; background: var(--color-navy-light); border: 1.5px solid var(--color-blue); }
  .t { font-size: 11px; font-weight: 700; color: var(--text-heading); }
  .v { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: var(--radius-sm);"></div><span class="t">sm</span><span class="v">8px</span></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-md);"></div><span class="t">md</span><span class="v">12px</span></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-lg);"></div><span class="t">lg</span><span class="v">16px</span></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-xl);"></div><span class="t">xl</span><span class="v">20px</span></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-pill); width: 110px;"></div><span class="t">pill</span><span class="v">9999px</span></div>
  </div>
</body>
</html>
